services:
  - type: web
    name: membership-modeler
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATA_ROOT
        value: /var/data
    disk:
      name: membership-modeler-data
      mountPath: /var/data
      sizeGB: 1
