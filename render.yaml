services:
  - type: web
    name: membership-modeler
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JSONBIN_KEY
        sync: false
      - key: JSONBIN_BIN_ID
        sync: false
