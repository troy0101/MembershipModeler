<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Club Membership Model</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root" style="padding:20px;color:#666;font-family:Segoe UI, sans-serif;">Loading app…</div>
  <script src="membership_model.js?v=20260224a"></script>
  <script>
    const rootEl = document.getElementById('root');
    const showBootError = (message) => {
      rootEl.innerHTML = '<div style="max-width:560px;margin:40px auto;padding:20px;border:1px solid #e4e4e4;border-radius:10px;background:#fff;color:#333;font-family:Segoe UI, sans-serif"><div style="font-weight:700;margin-bottom:8px">App failed to load</div><div style="font-size:13px;color:#666">' + message + '</div><div style="margin-top:14px;font-size:12px;color:#999">Try hard refresh (Ctrl+F5) and reload.</div></div>';
    };

    window.addEventListener('error', (event) => {
      showBootError(event?.message || 'Unexpected script error');
    });

    try {
      if (!window.App) {
        throw new Error('Frontend bundle did not initialize (window.App missing).');
      }
      ReactDOM.createRoot(rootEl).render(<App />);
    } catch (error) {
      showBootError(error?.message || 'Unknown bootstrap error');
    }
  </script>
</body>
</html>
